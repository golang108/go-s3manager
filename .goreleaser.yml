before:
  hooks:
    - go mod tidy
builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
checksum:
  name_template: "checksums.txt"
dockers:
  - image_templates:
      - "cloudlena/s3manager:{{ .Tag }}"
      - "cloudlena/s3manager:latest"
    dockerfile: Dockerfile.release
